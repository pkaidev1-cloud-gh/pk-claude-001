<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tic Tac Toe">
<title>Tic Tac Toe</title>
<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
  }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    color: #fff;
    touch-action: manipulation;
    overscroll-behavior: none;
  }

  .game {
    text-align: center;
    padding: 24px;
    width: 100%;
    max-width: 520px;
  }

  h1 {
    margin: 0 0 8px;
    letter-spacing: 2px;
    font-size: clamp(1.8rem, 6vmin, 2.6rem);
  }

  #status {
    margin: 8px 0 20px;
    font-size: clamp(1.1rem, 3.5vmin, 1.5rem);
    min-height: 1.5em;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 2.5vmin;
    width: min(85vmin, 480px);
    height: min(85vmin, 480px);
    margin: 0 auto 24px;
  }

  .cell {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    font-size: clamp(2.5rem, 12vmin, 4.5rem);
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    color: #fff;
  }

  .cell:active:not(.taken) {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(0.97);
  }

  .cell:hover:not(.taken) {
    background: rgba(255, 255, 255, 0.25);
  }

  .cell.taken {
    cursor: default;
  }

  .cell.x {
    color: #ff6b6b;
  }

  .cell.o {
    color: #4dd4ff;
  }

  .cell.win {
    background: rgba(255, 215, 0, 0.35);
    border-color: gold;
  }

  button {
    background: #4dd4ff;
    color: #1f1c2c;
    border: none;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: clamp(1rem, 3vmin, 1.2rem);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }

  button:hover {
    background: #ff6b6b;
  }

  button:active {
    transform: scale(0.96);
  }
</style>
</head>
<body>
  <div class="game">
    <h1>Tic Tac Toe</h1>
    <div id="status">Player X's turn</div>
    <div class="board" id="board"></div>
    <button id="reset">Restart</button>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');

    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
      [0, 4, 8], [2, 4, 6]             // diagonals
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;

    function render() {
      boardEl.innerHTML = '';
      board.forEach((value, index) => {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        if (value) {
          cell.classList.add('taken', value.toLowerCase());
          cell.textContent = value;
        }
        cell.addEventListener('click', () => handleMove(index));
        boardEl.appendChild(cell);
      });
    }

    function handleMove(index) {
      if (gameOver || board[index]) return;

      board[index] = currentPlayer;

      const winLine = checkWinner();
      if (winLine) {
        gameOver = true;
        statusEl.textContent = `Player ${currentPlayer} wins!`;
        render();
        highlightWin(winLine);
        return;
      }

      if (board.every(cell => cell)) {
        gameOver = true;
        statusEl.textContent = "It's a draw!";
        render();
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusEl.textContent = `Player ${currentPlayer}'s turn`;
      render();
    }

    function checkWinner() {
      return WIN_LINES.find(line =>
        line.every(i => board[i] === currentPlayer)
      );
    }

    function highlightWin(line) {
      line.forEach(i => boardEl.children[i].classList.add('win'));
    }

    function resetGame() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      statusEl.textContent = "Player X's turn";
      render();
    }

    resetBtn.addEventListener('click', resetGame);
    render();
  </script>
</body>
</html>
